<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --steel: #070B14;        /* deep space */
            --slate: #0E1630;        /* panel base */
            --iron: #18224A;         /* elevated panel */
            --zinc: #8EA3D4;         /* secondary text */
            --concrete: #E9F0FF;     /* primary text */

            --accent: #00F5FF;       /* neon cyan */
            --warning: #FF2EA6;      /* neon magenta */
            --success: #00FF85;      /* neon green */

            --glowCyan: rgba(0, 245, 255, 0.25);
            --glowMagenta: rgba(255, 46, 166, 0.22);
            --glowGreen: rgba(0, 255, 133, 0.18);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background:
                radial-gradient(1200px 700px at 15% 10%, rgba(0, 245, 255, 0.12), transparent 60%),
                radial-gradient(900px 600px at 85% 20%, rgba(255, 46, 166, 0.10), transparent 55%),
                radial-gradient(1100px 700px at 60% 95%, rgba(0, 255, 133, 0.08), transparent 55%),
                linear-gradient(135deg, var(--steel) 0%, #05060D 100%);
            color: var(--concrete);
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(1000px 600px at 50% 35%, rgba(0, 245, 255, 0.05), transparent 70%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(233, 240, 255, 0.024) 2px, rgba(233, 240, 255, 0.024) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(233, 240, 255, 0.02) 2px, rgba(233, 240, 255, 0.02) 4px);
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(1200px 900px at 50% 20%, transparent 45%, rgba(2, 3, 10, 0.55) 100%),
                repeating-linear-gradient(180deg, rgba(233, 240, 255, 0.016), rgba(233, 240, 255, 0.016) 1px, transparent 1px, transparent 5px);
            mix-blend-mode: soft-light;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        header {
            margin-bottom: 3rem;
            animation: slideDown 0.6s ease-out;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--warning) 60%, var(--success) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--zinc);
            letter-spacing: 0.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        .stat-card {
            background: rgba(14, 22, 48, 0.55);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.14);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--warning), var(--success));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 245, 255, 0.35);
            box-shadow:
                0 10px 45px rgba(0, 0, 0, 0.45),
                0 0 0 1px rgba(255, 46, 166, 0.10),
                0 0 32px var(--glowCyan);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--zinc);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 18px rgba(0, 245, 255, 0.16);
        }

        .controls {
            background: rgba(14, 22, 48, 0.55);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.14);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow:
                0 18px 60px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(0, 245, 255, 0.06),
                0 0 40px rgba(0, 245, 255, 0.06);
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--zinc);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input, select {
            background: rgba(7, 11, 20, 0.55);
            border: 1px solid rgba(233, 240, 255, 0.10);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--concrete);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(142, 163, 212, 0.7);
        }

        input:focus, select:focus {
            outline: none;
            border-color: rgba(0, 245, 255, 0.75);
            box-shadow:
                0 0 0 3px rgba(0, 245, 255, 0.12),
                0 0 22px rgba(0, 245, 255, 0.12);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--warning) 55%, var(--success) 100%);
            border: none;
            border-radius: 8px;
            padding: 1rem 2rem;
            color: #02030A;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 12px 35px rgba(0, 0, 0, 0.45),
                0 0 28px var(--glowMagenta);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .inventory-table {
            background: rgba(14, 22, 48, 0.55);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.14);
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 18px 60px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(255, 46, 166, 0.06),
                0 0 40px rgba(255, 46, 166, 0.06);
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(7, 11, 20, 0.65);
        }

        th {
            padding: 1rem;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            text-shadow: 0 0 14px rgba(0, 245, 255, 0.16);
            font-weight: 700;
        }

        tbody tr {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(0, 245, 255, 0.06);
        }

        td {
            padding: 1rem;
            color: var(--concrete);
        }

        .stock-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stock-low {
            background: rgba(255, 46, 166, 0.14);
            color: #FFD2EE;
            border: 1px solid rgba(255, 46, 166, 0.65);
        }

        .stock-ok {
            background: rgba(0, 255, 133, 0.12);
            color: #CFFFF0;
            border: 1px solid rgba(0, 255, 133, 0.6);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            background: rgba(0, 245, 255, 0.08);
            border: 1px solid rgba(0, 245, 255, 0.6);
            border-radius: 6px;
            padding: 0.5rem 1rem;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-small:hover {
            background: rgba(0, 245, 255, 0.18);
            border-color: rgba(0, 245, 255, 0.85);
            box-shadow: 0 0 22px rgba(0, 245, 255, 0.12);
            transform: translateY(-1px);
        }

        .btn-delete {
            border-color: rgba(255, 46, 166, 0.7);
            color: #FFD2EE;
        }

        .btn-delete:hover {
            background: rgba(255, 46, 166, 0.18);
            border-color: rgba(255, 46, 166, 0.9);
            box-shadow: 0 0 24px rgba(255, 46, 166, 0.12);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--zinc);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .menu-card {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(233, 240, 255, 0.08);
        }

        .menu-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            color: var(--zinc);
            margin-bottom: 0.5rem;
        }

        .menu-item {
            background: rgba(7, 11, 20, 0.7);
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            border: 1px solid rgba(233, 240, 255, 0.16);
            color: var(--concrete);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            transition: all 0.25s ease;
        }

        .menu-item span {
            opacity: 0.8;
        }

        .menu-item-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px rgba(0, 245, 255, 0.6);
        }

        .menu-item:hover {
            border-color: rgba(0, 245, 255, 0.85);
            box-shadow: 0 0 18px rgba(0, 245, 255, 0.28);
            transform: translateY(-1px);
        }

        .menu-item.active {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(255, 46, 166, 0.28));
            border-color: rgba(0, 245, 255, 0.95);
            box-shadow:
                0 0 0 1px rgba(0, 245, 255, 0.6),
                0 0 22px rgba(0, 245, 255, 0.32);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes rowAppear {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .row-enter {
            animation: rowAppear 0.4s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Warehouse</h1>
            <div class="subtitle">Inventory Management System</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Items</div>
                <div class="stat-value" id="totalItems">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Stock</div>
                <div class="stat-value" id="totalStock">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Low Stock</div>
                <div class="stat-value" id="lowStock">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Value</div>
                <div class="stat-value" id="totalValue">$0</div>
            </div>
        </div>

        <div class="controls">
            <div class="form-grid">
                <div class="form-group">
                    <label for="itemName">Item Name</label>
                    <input type="text" id="itemName" placeholder="Enter item name">
                </div>
                <div class="form-group">
                    <label for="itemCategory">Category</label>
                    <select id="itemCategory">
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Supplies">Supplies</option>
                        <option value="Equipment">Equipment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="itemQuantity">Quantity</label>
                    <input type="number" id="itemQuantity" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label for="itemPrice">Unit Price</label>
                    <input type="number" id="itemPrice" placeholder="0.00" min="0" step="0.01">
                </div>
            </div>
            <button class="btn" id="addBtn"><span>Add Item</span></button>

            <div class="menu-card">
                <div class="menu-title">Items Menu</div>
                <div class="menu-grid" id="itemsMenu">
                    <button class="menu-item active" data-category="All">
                        <span class="menu-item-dot"></span>
                        <span>All Items</span>
                    </button>
                    <button class="menu-item" data-category="Electronics">
                        <span class="menu-item-dot"></span>
                        <span>Electronics</span>
                    </button>
                    <button class="menu-item" data-category="Furniture">
                        <span class="menu-item-dot"></span>
                        <span>Furniture</span>
                    </button>
                    <button class="menu-item" data-category="Supplies">
                        <span class="menu-item-dot"></span>
                        <span>Supplies</span>
                    </button>
                    <button class="menu-item" data-category="Equipment">
                        <span class="menu-item-dot"></span>
                        <span>Equipment</span>
                    </button>
                    <button class="menu-item" data-category="Other">
                        <span class="menu-item-dot"></span>
                        <span>Other</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="inventory-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Quantity</th>
                        <th>Unit Price</th>
                        <th>Total Value</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    <tr>
                        <td colspan="8" class="empty-state">
                            <div class="empty-state-icon">📦</div>
                            <div>No items in inventory. Add your first item above.</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        class InventorySystem {
            constructor() {
                this.inventory = this.loadInventory();
                this.nextId = this.getNextId();
                this.activeCategory = 'All';
                this.init();
            }

            init() {
                this.renderInventory();
                this.updateStats();
                this.attachEventListeners();
            }

            attachEventListeners() {
                document.getElementById('addBtn').addEventListener('click', () => this.addItem());
                
                // Allow Enter key to add item
                ['itemName', 'itemQuantity', 'itemPrice'].forEach(id => {
                    document.getElementById(id).addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') this.addItem();
                    });
                });

                const menu = document.getElementById('itemsMenu');
                if (menu) {
                    menu.addEventListener('click', (event) => {
                        const target = event.target.closest('.menu-item');
                        if (!target) return;

                        const category = target.getAttribute('data-category');
                        this.setActiveCategory(category);
                    });
                }
            }

            setActiveCategory(category) {
                this.activeCategory = category || 'All';

                const buttons = document.querySelectorAll('#itemsMenu .menu-item');
                buttons.forEach(btn => {
                    if (btn.getAttribute('data-category') === this.activeCategory) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });

                this.renderInventory();
            }

            addItem() {
                const name = document.getElementById('itemName').value.trim();
                const category = document.getElementById('itemCategory').value;
                const quantity = parseInt(document.getElementById('itemQuantity').value) || 0;
                const price = parseFloat(document.getElementById('itemPrice').value) || 0;

                if (!name) {
                    alert('Please enter an item name');
                    return;
                }

                if (quantity < 0 || price < 0) {
                    alert('Quantity and price must be positive numbers');
                    return;
                }

                const item = {
                    id: this.nextId++,
                    name,
                    category,
                    quantity,
                    price
                };

                this.inventory.push(item);
                this.saveInventory();
                this.renderInventory();
                this.updateStats();
                this.clearForm();
            }

            deleteItem(id) {
                if (confirm('Are you sure you want to delete this item?')) {
                    this.inventory = this.inventory.filter(item => item.id !== id);
                    this.saveInventory();
                    this.renderInventory();
                    this.updateStats();
                }
            }

            updateQuantity(id, change) {
                const item = this.inventory.find(item => item.id === id);
                if (item) {
                    item.quantity = Math.max(0, item.quantity + change);
                    this.saveInventory();
                    this.renderInventory();
                    this.updateStats();
                }
            }

            renderInventory() {
                const tbody = document.getElementById('inventoryBody');
                const activeCategory = this.activeCategory || 'All';
                const visibleItems = activeCategory === 'All'
                    ? this.inventory
                    : this.inventory.filter(item => item.category === activeCategory);
                
                if (visibleItems.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="8" class="empty-state">
                                <div class="empty-state-icon">📦</div>
                                <div>No items to display for this view.</div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = visibleItems.map(item => {
                    const totalValue = (item.quantity * item.price).toFixed(2);
                    const stockStatus = item.quantity < 10 ? 'stock-low' : 'stock-ok';
                    const stockLabel = item.quantity < 10 ? 'Low Stock' : 'In Stock';

                    return `
                        <tr class="row-enter">
                            <td><strong>#${item.id}</strong></td>
                            <td>${item.name}</td>
                            <td>${item.category}</td>
                            <td>${item.quantity}</td>
                            <td>$${item.price.toFixed(2)}</td>
                            <td><strong>$${totalValue}</strong></td>
                            <td><span class="stock-badge ${stockStatus}">${stockLabel}</span></td>
                            <td class="actions">
                                <button class="btn-small" onclick="inventory.updateQuantity(${item.id}, 1)">+</button>
                                <button class="btn-small" onclick="inventory.updateQuantity(${item.id}, -1)">-</button>
                                <button class="btn-small btn-delete" onclick="inventory.deleteItem(${item.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            updateStats() {
                const totalItems = this.inventory.length;
                const totalStock = this.inventory.reduce((sum, item) => sum + item.quantity, 0);
                const lowStock = this.inventory.filter(item => item.quantity < 10).length;
                const totalValue = this.inventory.reduce((sum, item) => sum + (item.quantity * item.price), 0);

                document.getElementById('totalItems').textContent = totalItems;
                document.getElementById('totalStock').textContent = totalStock;
                document.getElementById('lowStock').textContent = lowStock;
                document.getElementById('totalValue').textContent = `$${totalValue.toFixed(2)}`;
            }

            clearForm() {
                document.getElementById('itemName').value = '';
                document.getElementById('itemQuantity').value = '';
                document.getElementById('itemPrice').value = '';
                document.getElementById('itemName').focus();
            }

            saveInventory() {
                localStorage.setItem('inventory', JSON.stringify(this.inventory));
                localStorage.setItem('nextId', this.nextId.toString());
            }

            loadInventory() {
                const saved = localStorage.getItem('inventory');
                return saved ? JSON.parse(saved) : [];
            }

            getNextId() {
                const saved = localStorage.getItem('nextId');
                return saved ? parseInt(saved) : 1;
            }
        }

        // Initialize the system
        const inventory = new InventorySystem();
    </script>
</body>
</html>
